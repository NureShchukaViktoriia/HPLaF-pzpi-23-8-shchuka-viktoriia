<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
        }

        button {
            padding: 10px 15px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<h1 style="text-align:center;">{{ title }}</h1>
<h3 style="text-align:center;">Організація: {{ organization.name }}</h3>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Зберегти</button>
</form>

<a href="{% url 'organization_list' %}">Повернутися назад</a>

</body>
</html>
